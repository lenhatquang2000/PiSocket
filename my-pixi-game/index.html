<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-pixi-game</title>
  </head>
  <body>
    <div id="ui-overlay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 100;">
      <h2 style="margin-top: 0;">Vào Game</h2>
      <input type="text" id="game-id" placeholder="Nhập Game ID (Tên)" style="padding: 10px; margin-bottom: 10px; width: 200px; display: block; border: 1px solid #ccc; border-radius: 5px;">
      <button id="create-btn" style="padding: 10px 20px; background: #1099bb; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Tạo nhân vật</button>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
