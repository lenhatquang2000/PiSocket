<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-pixi-game</title>
  </head>
  <body>
    <!-- Màn hình Loading -->
    <div id="loading-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1099bb; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: white; font-family: Arial, sans-serif;">
      <div style="width: 200px; height: 10px; background: rgba(255,255,255,0.3); border-radius: 5px; overflow: hidden; margin-bottom: 10px;">
        <div id="loading-bar" style="width: 0%; height: 100%; background: white; transition: width 0.3s;"></div>
      </div>
      <div id="loading-text">Đang tải tài nguyên... 0%</div>
    </div>

    <div id="ui-overlay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); padding: 30px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #1099bb; z-index: 100; display: none; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-width: 350px;">
      
      <!-- Login / Register Section -->
      <div id="auth-section">
        <div style="display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
          <button id="tab-login-btn" style="flex: 1; padding: 10px; background: none; border: none; color: #1099bb; font-weight: bold; cursor: pointer; border-bottom: 2px solid #1099bb; font-size: 16px;">Đăng Nhập</button>
          <button id="tab-register-btn" style="flex: 1; padding: 10px; background: none; border: none; color: #aaa; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; font-size: 16px;">Đăng Ký</button>
        </div>
        
        <div id="login-form">
          <input type="text" id="login-username" placeholder="Tên tài khoản" style="padding: 12px; margin-bottom: 12px; width: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;">
          <input type="password" id="login-password" placeholder="Mật khẩu" style="padding: 12px; margin-bottom: 20px; width: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;">
          <button id="login-btn" style="width: 100%; padding: 12px; background: #1099bb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.2s;">Xác Nhận</button>
        </div>
        
        <div id="register-form" style="display: none;">
          <input type="text" id="register-username" placeholder="Tên tài khoản mới" style="padding: 12px; margin-bottom: 12px; width: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;">
          <input type="password" id="register-password" placeholder="Mật khẩu mới" style="padding: 12px; margin-bottom: 20px; width: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;">
          <button id="register-btn" style="width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.2s;">Đăng Ký Tài Khoản</button>
        </div>
      </div>

      <!-- Character Selection Section -->
      <div id="char-section" style="display: none;">
        <h2 style="margin-top: 0; color: #1099bb; font-size: 22px; margin-bottom: 20px;">Chọn Nhân Vật</h2>
        <div id="char-list" style="display: flex; flex-direction: column; gap: 12px; max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
          <!-- Characters will be listed here -->
        </div>
        
        <!-- Add character trigger button -->
        <button id="show-create-char-btn" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2); border-radius: 8px; color: #aaa; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;">
          <span style="font-size: 20px; line-height: 1;">+</span> Tạo nhân vật mới
        </button>
        
        <!-- New Character form (hidden initially) -->
        <div id="create-char-form" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
          <input type="text" id="new-char-name" placeholder="Tên nhân vật mới" style="padding: 12px; margin-bottom: 12px; width: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;">
          <input type="text" id="char-access-code" placeholder="Access Code (tùy chọn)" style="padding: 12px; margin-bottom: 15px; width: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;">
          <div style="display: flex; gap: 10px;">
            <button id="cancel-create-char-btn" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Hủy</button>
            <button id="confirm-create-char-btn" style="flex: 1; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Tạo</button>
          </div>
        </div>
      </div>
      
    </div>
    <div id="app"></div>

    <!-- Nút Debug va chạm -->
    <button id="debug-btn" style="position: absolute; bottom: 20px; right: 20px; padding: 10px 15px; background: rgba(0,0,0,0.6); color: white; border: 1px solid white; border-radius: 5px; cursor: pointer; z-index: 100;">Show Colliders (H)</button>

    <!-- Nút Tele Neural -->
    <button id="tele-neural-btn" style="position: absolute; bottom: 20px; right: 200px; padding: 10px 15px; background: rgba(155, 89, 182, 0.8); color: white; border: 1px solid white; border-radius: 5px; cursor: pointer; z-index: 100;">⚡ Tele Neural</button>

    <!-- UI Teleport Chunk -->
    <div id="chunk-teleport-panel" style="position: fixed; bottom: 80px; right: 20px; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 8px; border: 2px solid #e74c3c; z-index: 150; font-family: Arial, sans-serif; min-width: 250px;">
      <div style="color: #e74c3c; font-weight: bold; margin-bottom: 10px; font-size: 14px; text-align: center;">
        🗺️ Teleport to Chunk
      </div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <div style="flex: 1;">
          <label style="color: #aaa; font-size: 12px; display: block; margin-bottom: 5px;">Chunk X:</label>
          <input type="number" id="chunk-x-input" value="0" style="width: 100%; padding: 8px; border: 1px solid #555; border-radius: 4px; background: #222; color: white; font-size: 14px;">
        </div>
        <div style="flex: 1;">
          <label style="color: #aaa; font-size: 12px; display: block; margin-bottom: 5px;">Chunk Y:</label>
          <input type="number" id="chunk-y-input" value="0" style="width: 100%; padding: 8px; border: 1px solid #555; border-radius: 4px; background: #222; color: white; font-size: 14px;">
        </div>
      </div>
      <button id="teleport-chunk-btn" style="width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;">
        🚀 Teleport
      </button>
      <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); color: #aaa; font-size: 11px;">
        <div id="current-chunk-text">Current: Chunk (0, 0)</div>
        <div id="chunk-status-text" style="margin-top: 5px; color: #2ecc71;">✅ Loaded</div>
      </div>
    </div>

    <!-- UI HP/MP cố định góc trên bên trái -->
    <div id="stats-panel" style="position: fixed; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px; border: 2px solid #1099bb; z-index: 150; font-family: Arial, sans-serif; min-width: 200px;">
      <div style="color: #ff6b6b; font-weight: bold; margin-bottom: 10px; font-size: 14px;">
        <span>❤️ HP: </span>
        <span id="hp-text">100/100</span>
      </div>
      <div style="width: 100%; height: 20px; background: rgba(255, 255, 255, 0.2); border-radius: 4px; overflow: hidden; margin-bottom: 10px;">
        <div id="hp-bar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #ff6b6b, #ff8787); transition: width 0.3s ease;"></div>
      </div>
      
      <div style="color: #4ecdc4; font-weight: bold; margin-bottom: 10px; font-size: 14px;">
        <span>✨ MP: </span>
        <span id="mp-text">50/50</span>
      </div>
      <div style="width: 100%; height: 20px; background: rgba(255, 255, 255, 0.2); border-radius: 4px; overflow: hidden; margin-bottom: 10px;">
        <div id="mp-bar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #4ecdc4, #45b7aa); transition: width 0.3s ease;"></div>
      </div>
      
      <div style="color: #f39c12; font-weight: bold; font-size: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2);">
        <span>📍 Tọa độ: </span>
        <span id="position-text">X: 0, Y: 0</span>
      </div>
    </div>

    <!-- UI Chọn Cây Trồng -->
    <div id="crop-selection-panel" style="position: fixed; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 8px; border: 2px solid #2ecc71; z-index: 150; font-family: Arial, sans-serif; min-width: 180px; display: none;">
      <div style="color: #2ecc71; font-weight: bold; margin-bottom: 10px; font-size: 16px; text-align: center;">
        🌾 Chọn Cây Trồng
      </div>
      <div id="crop-list" style="display: flex; flex-direction: column; gap: 8px;">
        <!-- Crop items will be added here dynamically -->
      </div>
      <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); color: #aaa; font-size: 12px; text-align: center;">
        Nhấn <span style="color: #2ecc71; font-weight: bold;">T</span> để trồng
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
